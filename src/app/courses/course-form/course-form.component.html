<mat-card class="mat-card">
  <mat-toolbar color="primary">
      Cadastrar Curso
  </mat-toolbar>
  <mat-card-content>
    <form [formGroup]="form">
      <mat-form-field class="full-width">
        <input matInput placeholder="Nome do Curso" formControlName="name">
      </mat-form-field>
      <mat-form-field class="full-width">
        <input matInput placeholder="Categoria do Curso" formControlName="category">
      </mat-form-field>
    </form>
  </mat-card-content>
  <mat-card-actions class="mat-card-actions">
    <button mat-raised-button color="primary" (click)="onSubmit()">SALVAR</button>
    <button mat-raised-button (click)="onCancel()" class="ml-10">CANCELAR</button>
  </mat-card-actions>
</mat-card>
