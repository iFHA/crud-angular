<mat-card class="mat-card">
  <mat-toolbar color="primary">
      Cadastrar Curso
  </mat-toolbar>
  <mat-card-content>
    <form [formGroup]="form" class="min-width">
      <mat-form-field class="full-width">
        <input matInput placeholder="Nome do Curso" formControlName="name">
      </mat-form-field>
      <mat-form-field class="full-width">
        <mat-label for="categoria">Categoria</mat-label>
        <mat-select formControlName="category" matNativeControl required name="categoria">
          <mat-option value="">Selecione uma opção</mat-option>
          <mat-option value="Front-End">Front-End</mat-option>
          <mat-option value="Back-End">Back-End</mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </mat-card-content>
  <mat-card-actions class="mat-card-actions">
    <button mat-raised-button color="primary" (click)="onSubmit()">CADASTRAR</button>
    <button mat-raised-button (click)="onCancel()" class="ml-10">VOLTAR</button>
  </mat-card-actions>
</mat-card>
